      <stop offset="0%" style="stop-color:#0EA5E9"/>
      <stop offset="100%" style="stop-color:#0284C7"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="128" height="128" rx="32" fill="url(#grad1)"/>
  
  <!-- Person silhouette -->
  <g transform="translate(32, 24)">
    <!-- Head -->
    <circle cx="32" cy="24" r="16" fill="white" fill-opacity="0.9"/>
    
    <!-- Body -->
    <path d="M16 48 L48 48 L48 80 L32 72 L16 80 Z" fill="white" fill-opacity="0.9"/>
    
    <!-- AI circuit on chest -->
    <circle cx="32" cy="60" r="6" fill="none" stroke="#0EA5E9" stroke-width="2"/>
    <circle cx="32" cy="60" r="2" fill="#0EA5E9"/>
    
    <!-- Connection points -->
    <circle cx="32" cy="48" r="2" fill="#0EA5E9"/>
    <circle cx="32" cy="72" r="2" fill="#0EA5E9"/>
    <circle cx="20" cy="60" r="2" fill="#0EA5E9"/>
    <circle cx="44" cy="60" r="2" fill="#0EA5E9"/>
    
    <!-- Connection lines -->
    <line x1="32" y1="48" x2="32" y2="54" stroke="#0EA5E9" stroke-width="1.5"/>
    <line x1="32" y1="66" x2="32" y2="72" stroke="#0EA5E9" stroke-width="1.5"/>
    <line x1="20" y1="60" x2="26" y2="60" stroke="#0EA5E9" stroke-width="1.5"/>
    <line x1="38" y1="60" x2="44" y2="60" stroke="#0EA5E9" stroke-width="1.5"/>
